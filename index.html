<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CleanR - Gallery</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <script defer src="https://use.fontawesome.com/releases/v6.4.0/js/all.js"></script>

  <style>
    .hero.is-gallery {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1603712725038-e9334ae8f39f');
      background-size: cover;
      background-position: center;
    }

    .gallery-img {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
    }

    .gallery-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .gallery-img:hover img {
      transform: scale(1.08);
    }

    .before-after {
      border-radius: 12px;
      overflow: hidden;
    }

    .before-after img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .section-title { margin-bottom: 2rem; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar is-white">
  <div class="navbar-brand">
    <a href="index.html" class="navbar-item has-text-weight-bold is-size-4">CleanR</a>
    <a role="button" class="navbar-burger" data-target="navMenu">
      <span></span><span></span><span></span>
    </a>
  </div>

  <div id="navMenu" class="navbar-menu">
    <div class="navbar-end">
      <a href="index.html" class="navbar-item">Home</a>
      <a href="services.html" class="navbar-item">Services</a>
      <a href="about.html" class="navbar-item">About</a>
      <a class="navbar-item is-active">Gallery</a>
      <a href="contact.html" class="navbar-item">Contact</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero is-gallery is-medium">
  <div class="hero-body">
    <div class="container has-text-centered">
      <h1 class="title has-text-white is-2">Our Work Gallery</h1>
      <h2 class="subtitle has-text-white is-5">See the difference CleanR makes</h2>
    </div>
  </div>
</section>

<!-- GALLERY GRID -->
<section class="section">
  <div class="container">
    <h2 class="title has-text-centered section-title">Cleaning in Action</h2>

    <div class="columns is-multiline">
      <div class="column is-4">
        <div class="gallery-img">
          <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952" alt="Cleaning">
        </div>
      </div>

      <div class="column is-4">
        <div class="gallery-img">
          <img src="https://images.unsplash.com/photo-1581579188871-45ea61f2a6c7" alt="Cleaning">
        </div>
      </div>

      <div class="column is-4">
        <div class="gallery-img">
          <img src="https://images.unsplash.com/photo-1527515637462-cff94eecc1ac" alt="Cleaning">
        </div>
      </div>

      <div class="column is-4">
        <div class="gallery-img">
          <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c" alt="Cleaning">
        </div>
      </div>

      <div class="column is-4">
        <div class="gallery-img">
          <img src="https://images.unsplash.com/photo-1560185127-6ed189bf02f4" alt="Cleaning">
        </div>
      </div>

      <div class="column is-4">
        <div class="gallery-img">
          <img src="https://images.unsplash.com/photo-1598300056393-4aac492f4344" alt="Cleaning">
        </div>
      </div>
    </div>
  </div>
</section>

<!-- BEFORE & AFTER -->
<section class="section has-background-light">
  <div class="container">
    <h2 class="title has-text-centered section-title">Before & After</h2>

    <div class="columns">
      <div class="column">
        <div class="before-after">
          <img src="https://images.unsplash.com/photo-1598300056393-4aac492f4344" alt="Before">
          <p class="has-text-centered mt-2"><strong>Before</strong></p>
        </div>
      </div>

      <div class="column">
        <div class="before-after">
          <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952" alt="After">
          <p class="has-text-centered mt-2"><strong>After</strong></p>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="section has-text-centered">
  <div class="container">
    <h2 class="title">Want results like this?</h2>
    <a href="https://wa.me/2340000000000" class="button is-primary is-large">Book a Cleaning</a>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="content has-text-centered">
    <p><strong>CleanR</strong> &copy; 2026. All rights reserved.</p>
  </div>
</footer>

<script>
  document.querySelector('.navbar-burger').addEventListener('click', () => {
    document.querySelector('.navbar-burger').classList.toggle('is-active');
    document.querySelector('.navbar-menu').classList.toggle('is-active');
  });
</script>

</body>
</html>
